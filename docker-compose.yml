version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: facebook_tracking
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/facebook_tracking
    depends_on:
      - db
    volumes:
      - .:/app
    command: >
      sh -c "python -c 'import time; time.sleep(5)' &&
             flask db upgrade &&
             python app.py"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - web

volumes:
  postgres_data:
